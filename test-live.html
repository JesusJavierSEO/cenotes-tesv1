<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Pago Live — Uso interno</title>
<style>
  body { font-family: sans-serif; background:#0d2b1e; color:white;
         display:flex; align-items:center; justify-content:center;
         min-height:100vh; margin:0; padding:20px; box-sizing:border-box; }
  .card { background:#1a3a2a; border-radius:16px; padding:36px 28px;
          max-width:420px; width:100%; }
  h1 { font-size:1.1rem; margin:0 0 6px; }
  p { color:rgba(255,255,255,0.55); font-size:0.83rem; margin:0 0 20px; line-height:1.6; }
  input { width:100%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
          color:white; padding:11px 14px; border-radius:8px; font-size:0.88rem;
          margin-bottom:10px; box-sizing:border-box; }
  input::placeholder { color:rgba(255,255,255,0.35); }
  .precio { font-size:1.8rem; font-weight:700; color:#0a9da8; text-align:center; margin:16px 0 4px; }
  .comision { font-size:0.78rem; color:rgba(255,255,255,0.35); text-align:center; margin-bottom:20px; }
  button { background:#0a9da8; color:white; border:none; padding:13px;
           border-radius:10px; font-size:0.9rem; cursor:pointer; width:100%;
           font-weight:600; }
  button:hover { background:#087e8b; }
  .warn { background:rgba(255,200,0,0.1); border:1px solid rgba(255,200,0,0.3);
          border-radius:8px; padding:10px 12px; font-size:0.78rem; color:#ffd700;
          margin-bottom:18px; }
  label { font-size:0.75rem; color:rgba(255,255,255,0.5); display:block; margin-bottom:4px; }
</style>
</head>
<body>
<div class="card">
  <h1>🔧 Test de pago en producción</h1>
  <p>Para verificar webhook → Sheets + email de confirmación.</p>
  <div class="warn">⚠ Pago REAL de $10 MXN (~$0.50 USD en comisiones).</div>

  <label>Tu nombre</label>
  <input id="t-nombre" type="text" placeholder="Jesús Javier">

  <label>Tu correo electrónico</label>
  <input id="t-email" type="email" placeholder="tu@correo.com">

  <label>Teléfono</label>
  <input id="t-tel" type="tel" placeholder="+52 999 410 5737">

  <div class="precio">$10 MXN</div>
  <div class="comision">Comisión Stripe aprox. $3.36 MXN</div>
  <button onclick="pagar()">Pagar $10 MXN con tarjeta real</button>
</div>

<script>
async function pagar() {
  const nombre = document.getElementById('t-nombre').value.trim();
  const email  = document.getElementById('t-email').value.trim();
  const tel    = document.getElementById('t-tel').value.trim();
  if (!email) { alert('Ingresa tu correo para verificar el email de confirmación'); return; }

  try {
    const res = await fetch('/api/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tour_slug:   'test-pago-live',
        tour_nombre: 'TEST — Verificación de sistema',
        line_items:  [{ nombre: 'TEST Live Webhook', precio_unitario: 10, cantidad: 1 }],
        cliente:     nombre || 'Test User',
        email:       email,
        telefono:    tel,
        fecha:       new Date().toLocaleDateString('es-MX'),
        success_url: window.location.origin + '/gracias.html?tour=' + encodeURIComponent('TEST — Verificación de sistema'),
        cancel_url:  window.location.origin + '/test-live.html',
        ref:         'jesus'
      })
    });
    const data = await res.json();
    if (data.url) {
      sessionStorage.setItem('fechaTour', new Date().toLocaleDateString('es-MX'));
      window.location.href = data.url;
    } else {
      alert('Error: ' + JSON.stringify(data));
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}
</script>
</body>
</html>
