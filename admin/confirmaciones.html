<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmaciones — Cenotes Homún</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--verde:#1a3a2a;--agua:#0a9da8;--gris:#f4f4f2;--borde:#e2e2de;--exito:#38a169;--error:#e53e3e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--gris);min-height:100vh}
.topbar{background:var(--verde);padding:14px 24px;display:flex;align-items:center;gap:10px}
.topbar-logo{color:white;font-weight:700;font-size:1rem}
.topbar-logo span{color:#7fe3e8}
.topbar-badge{margin-left:auto;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);font-size:0.7rem;padding:3px 10px;border-radius:10px;letter-spacing:0.1em;text-transform:uppercase}
.pagenav{background:white;border-bottom:1px solid var(--borde);padding:0 24px;display:flex;gap:16px}
.pagenav a{padding:10px 4px;font-size:0.78rem;font-weight:600;color:#aaa;text-decoration:none;border-bottom:2px solid transparent}
.pagenav a.active{color:var(--verde);border-color:var(--agua)}
.content{max-width:560px;margin:0 auto;padding:24px 20px}
.card{background:white;border-radius:14px;border:1px solid var(--borde);padding:22px;margin-bottom:16px}
.card h3{font-size:0.9rem;font-weight:700;color:var(--verde);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.card .desc{font-size:0.8rem;color:#888;margin-bottom:16px}
.campo{margin-bottom:12px}
.campo label{display:block;font-size:0.75rem;font-weight:600;color:var(--verde);margin-bottom:5px;letter-spacing:0.02em}
.campo select,.campo input,.campo textarea{width:100%;padding:10px 12px;border:1.5px solid var(--borde);border-radius:8px;font-family:'Outfit',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;background:white}
.campo select:focus,.campo input:focus,.campo textarea:focus{border-color:var(--agua)}
.campo textarea{resize:vertical;min-height:56px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.toggle{display:flex;border:1.5px solid var(--borde);border-radius:8px;overflow:hidden}
.toggle button{flex:1;padding:9px;border:none;background:white;font-family:'Outfit',sans-serif;font-size:0.82rem;font-weight:600;color:#999;cursor:pointer}
.toggle button.active{background:var(--agua);color:white}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:4px}
.btn-primary{background:var(--agua);color:white}
.btn-primary:hover{background:#088a94}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.result-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:14px;margin-top:12px;display:none;font-size:0.84rem;color:#276749}
.result-box.error{background:#fef2f2;border-color:#fca5a5;color:#c53030}
.preview-toggle{font-size:0.78rem;color:var(--agua);cursor:pointer;text-align:center;margin-top:10px;text-decoration:underline}
.preview-frame{width:100%;height:520px;border:1.5px solid var(--borde);border-radius:10px;margin-top:10px;display:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--verde);color:white;padding:10px 20px;border-radius:20px;font-size:0.84rem;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">Cenotes <span>Homún</span></div>
  <div class="topbar-badge">🔒 Panel Privado</div>
</div>

<div class="pagenav">
  <a href="ventas.html">Ventas</a>
  <a href="confirmaciones.html" class="active">Confirmaciones</a>
</div>

<div class="content">

  <div class="card">
    <h3>📧 Enviar correo de confirmación</h3>
    <div class="desc">Para reservas pagadas por transferencia o Stripe fuera del checkout web.</div>

    <div class="campo">
      <label>Tour</label>
      <select id="c-tour" onchange="actualizarPrecio()">
        <option value="">Selecciona un tour...</option>
        <option value="cenote-santa-barbara"          data-precio="575"  data-nombre="Cenote Santa Bárbara Básico">Cenote Santa Bárbara — $575 MXN</option>
        <option value="cenote-santa-rosa"              data-precio="315"  data-nombre="Cenote Santa Rosa">Cenote Santa Rosa — $315 MXN</option>
        <option value="cenotes-santa-cruz"             data-precio="600"  data-nombre="Cenotes Santa Cruz — Paquete Hacienda">Cenotes Santa Cruz Hacienda — $600 MXN</option>
        <option value="cenote-santa-cruz-cuatrimotos"  data-precio="900"  data-nombre="Cenote Santa Cruz + Cuatrimotos">Santa Cruz + Cuatrimotos — $900 MXN</option>
        <option value="cenotes-casa-tortuga"           data-precio="750"  data-nombre="Cenotes Casa Tortuga">Casa Tortuga Básico — $750 MXN</option>
        <option value="casa-tortuga-silver"            data-precio="1000" data-nombre="Casa Tortuga — Paquete Silver">Casa Tortuga Silver — $1,000 MXN</option>
        <option value="cenotes-casa-tortuga-gold"      data-precio="1650" data-nombre="Casa Tortuga — Paquete GOLD">Casa Tortuga GOLD — $1,650 MXN</option>
        <option value="off-road-casa-tortugas"         data-precio="1750" data-nombre="Off Road Casa Tortugas">Off Road Casa Tortugas — $1,750 MXN</option>
        <option value="isla-mujeres-catamaran"         data-precio="1590" data-nombre="Isla Mujeres Catamarán All Inclusive">Isla Mujeres Catamarán — $1,590 MXN</option>
        <option value="">Otro (escribir nombre abajo)</option>
      </select>
    </div>

    <div class="campo" id="c-tour-otro-wrap" style="display:none">
      <label>Nombre del tour (personalizado)</label>
      <input type="text" id="c-tour-otro" placeholder="Nombre del tour">
    </div>

    <div class="row2">
      <div class="campo">
        <label>Nombre del cliente</label>
        <input type="text" id="c-cliente" placeholder="Nombre del cliente">
      </div>
      <div class="campo">
        <label>Email del cliente</label>
        <input type="email" id="c-email" placeholder="cliente@correo.com">
      </div>
    </div>

    <div class="row3">
      <div class="campo">
        <label>Fecha del tour</label>
        <input type="date" id="c-fecha">
      </div>
      <div class="campo">
        <label>Hora</label>
        <input type="time" id="c-hora" value="09:00">
      </div>
      <div class="campo">
        <label>Personas</label>
        <input type="number" id="c-personas" value="2" min="1" oninput="actualizarPrecio()">
      </div>
    </div>

    <div class="row2">
      <div class="campo">
        <label>Precio total (MXN)</label>
        <input type="number" id="c-precio" step="0.01" placeholder="0">
      </div>
      <div class="campo">
        <label>Método de pago</label>
        <select id="c-metodo">
          <option value="transferencia">Transferencia</option>
          <option value="stripe">Stripe</option>
        </select>
      </div>
    </div>

    <div class="campo">
      <label>Punto de encuentro (opcional — usa el default si se deja vacío)</label>
      <input type="text" id="c-punto" placeholder="Entrada de Homún, Yucatán">
    </div>

    <div class="campo">
      <label>Notas adicionales (opcional)</label>
      <textarea id="c-notas" placeholder="Ej. Traer efectivo para propinas de guías locales"></textarea>
    </div>

    <div class="campo">
      <label>Idioma del correo</label>
      <div class="toggle" id="c-lang">
        <button type="button" data-lang="es" class="active" onclick="setLang('es')">Español</button>
        <button type="button" data-lang="en" onclick="setLang('en')">English</button>
      </div>
    </div>

    <button class="btn btn-primary" id="btn-enviar" onclick="enviarConfirmacion()">Enviar correo de confirmación</button>
    <div class="preview-toggle" onclick="togglePreview()">Vista previa del correo</div>
    <iframe class="preview-frame" id="preview-frame"></iframe>

    <div class="result-box" id="resultado"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>

// ── MANEJO DE TOKEN DE SESIÓN ─────────────────────────────
(function() {
  var params = new URLSearchParams(window.location.search);
  var token  = params.get('token') || sessionStorage.getItem('adminToken');
  if (token) {
    sessionStorage.setItem('adminToken', token);
    if (params.get('token')) {
      window.history.replaceState({}, '', window.location.pathname);
    }
    var origFetch = window.fetch;
    window.fetch = function(url, opts) {
      opts = opts || {};
      opts.headers = opts.headers || {};
      opts.headers['x-admin-token'] = token;
      return origFetch(url, opts);
    };
  }
})();

var lang = 'es';

function setLang(l) {
  lang = l;
  document.querySelectorAll('#c-lang button').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-lang') === l);
  });
}

function tourSeleccionado() {
  var sel = document.getElementById('c-tour');
  var opt = sel.options[sel.selectedIndex];
  var otro = document.getElementById('c-tour-otro').value.trim();
  return {
    slug:   sel.value,
    nombre: otro || (opt ? opt.getAttribute('data-nombre') : '') || '',
  };
}

document.getElementById('c-tour').addEventListener('change', function() {
  document.getElementById('c-tour-otro-wrap').style.display = this.value ? 'none' : 'block';
});

function actualizarPrecio() {
  var sel = document.getElementById('c-tour');
  var opt = sel.options[sel.selectedIndex];
  var precioBase = opt ? parseFloat(opt.getAttribute('data-precio')) : null;
  var personas = parseInt(document.getElementById('c-personas').value) || 1;
  if (precioBase) {
    document.getElementById('c-precio').value = precioBase * personas;
  }
}

function datos() {
  var tour = tourSeleccionado();
  return {
    tour_slug:       tour.slug,
    tour_nombre:      tour.nombre,
    cliente:          document.getElementById('c-cliente').value.trim(),
    email:            document.getElementById('c-email').value.trim(),
    fecha_tour:       document.getElementById('c-fecha').value,
    hora:             document.getElementById('c-hora').value,
    personas:         parseInt(document.getElementById('c-personas').value) || 1,
    precio:           document.getElementById('c-precio').value,
    metodo_pago:      document.getElementById('c-metodo').value,
    punto_encuentro:  document.getElementById('c-punto').value.trim(),
    notas:            document.getElementById('c-notas').value.trim(),
    lang:             lang,
  };
}

async function enviarConfirmacion() {
  var d = datos();
  if (!d.email) { alert('Falta el email del cliente'); return; }
  if (!d.tour_nombre && !d.tour_slug) { alert('Selecciona un tour o escribe uno personalizado'); return; }

  var btn = document.getElementById('btn-enviar');
  btn.disabled = true; btn.textContent = 'Enviando...';
  var box = document.getElementById('resultado');
  box.style.display = 'none'; box.classList.remove('error');

  try {
    var res  = await fetch('/api/enviar-confirmacion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(d),
    });
    var data = await res.json();
    if (data.ok) {
      box.textContent = '✓ Correo enviado a ' + d.email;
      box.style.display = 'block';
      mostrarToast('✓ Correo de confirmación enviado');
    } else {
      box.textContent = 'Error: ' + (data.error || 'desconocido');
      box.classList.add('error');
      box.style.display = 'block';
    }
  } catch (err) {
    box.textContent = 'Error de conexión: ' + err.message;
    box.classList.add('error');
    box.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Enviar correo de confirmación';
}

function togglePreview() {
  var frame = document.getElementById('preview-frame');
  var d = datos();
  var visible = frame.style.display === 'block';
  if (visible) { frame.style.display = 'none'; return; }

  var tourNombre = d.tour_nombre || '[tour]';
  var precio = d.precio || 0;
  var pagoTxt = d.metodo_pago === 'stripe'
    ? (lang === 'en' ? 'Card (Stripe)' : 'Tarjeta (Stripe)')
    : (lang === 'en' ? 'Bank transfer' : 'Transferencia bancaria');
  var punto = d.punto_encuentro || (lang === 'en' ? 'Homún town entrance, Yucatán' : 'Entrada de Homún, Yucatán');
  var hora = d.hora || '9:00 AM';
  var titulo = lang === 'en' ? 'Booking confirmed!' : '¡Reserva confirmada!';
  var saludo = lang === 'en'
    ? 'Hi ' + (d.cliente || 'traveler') + ', your payment was processed successfully.'
    : 'Hola ' + (d.cliente || 'viajero') + ', tu pago fue procesado exitosamente.';

  var html = '<div style="font-family:Helvetica Neue,sans-serif;max-width:480px;margin:20px auto;background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08)">' +
    '<div style="background:#1a3a2a;padding:24px;text-align:center"><div style="color:#f5ede0;font-size:1.2rem;font-weight:700">Cenotes Homún</div></div>' +
    '<div style="padding:24px">' +
    '<div style="text-align:center;font-size:2.4rem;margin-bottom:10px">✅</div>' +
    '<div style="text-align:center;font-weight:700;color:#1a3a2a;margin-bottom:6px">' + titulo + '</div>' +
    '<div style="text-align:center;color:#888;font-size:0.85rem;margin-bottom:20px">' + saludo + '</div>' +
    '<div style="background:#f8f7f4;border-radius:12px;padding:16px;font-size:0.85rem">' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:#999">Tour</span><span style="color:#1a3a2a;font-weight:600">' + tourNombre + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:#999">' + (lang === 'en' ? 'Date' : 'Fecha') + '</span><span style="color:#1a3a2a;font-weight:600">' + (d.fecha_tour || (lang === 'en' ? 'To be confirmed' : 'Por confirmar')) + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:#999">' + (lang === 'en' ? 'Guests' : 'Personas') + '</span><span style="color:#1a3a2a;font-weight:600">' + d.personas + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:#999">' + (lang === 'en' ? 'Total paid' : 'Total pagado') + '</span><span style="color:#1a3a2a;font-weight:600">$' + precio + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:#999">' + (lang === 'en' ? 'Payment method' : 'Método de pago') + '</span><span style="color:#1a3a2a;font-weight:600">' + pagoTxt + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:#999">' + (lang === 'en' ? 'Meeting point' : 'Punto de encuentro') + '</span><span style="color:#1a3a2a;font-weight:600">' + punto + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:#999">' + (lang === 'en' ? 'Time' : 'Horario') + '</span><span style="color:#1a3a2a;font-weight:600">' + hora + '</span></div>' +
    '</div>' +
    (d.notas ? '<div style="background:rgba(10,157,168,0.06);border-radius:10px;padding:12px 14px;font-size:0.82rem;color:#555;margin-top:16px">' + d.notas + '</div>' : '') +
    '</div></div>';

  frame.srcdoc = html;
  frame.style.display = 'block';
}

function mostrarToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

(function() {
  var hoy = new Date();
  document.getElementById('c-fecha').min = hoy.toISOString().split('T')[0];
  actualizarPrecio();
})();
</script>
</body>
</html>
